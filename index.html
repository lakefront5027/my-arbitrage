<style>

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }

  .progress-bar { transition: width 0.25s linear; }

  ::-webkit-scrollbar-track { background: #111; }

  .sort-active { opacity: 1; color: #f59e0b; }

  th { user-select: none; }
  .tag-us { background: #1a3a6b22; color: #60a5fa; border: 1px solid #1a3a6b; }
  .tag-hk { background: #6b1a1a22; color: #f87171; border: 1px solid #6b1a1a; }
  .tag-cm { background: #6b4c1a22; color: #fbbf24; border: 1px solid #6b4c1a; }

<body class="min-h-screen">

<!-- ══════════════════════════════════════════════════
     HEADER
══════════════════════════════════════════════════ -->
<header class="sticky top-0 z-50 border-b border-border" style="background:#0d0d0d">
  <div class="flex items-stretch justify-between px-4 md:px-6">
    <!-- Logo -->
    <div class="flex items-center gap-3 py-3">
      <div>
        <div class="font-mono text-xl font-semibold tracking-wider text-primary">LOF 套利雷达</div>
        <div class="font-mono text-[9px] text-muted tracking-widest mt-0.5">LIVE ARBITRAGE MONITOR</div>
      </div>
    </div>

    <!-- Tickers -->
    <div id="tickers" class="hidden md:flex items-center gap-5 px-4 overflow-hidden">
      <!-- injected by JS -->
    </div>

    <!-- Controls -->
    <div class="flex items-center gap-2 py-2 pl-3 border-l border-border flex-shrink-0">
      <div id="clock" class="font-mono text-xs text-muted hidden md:block"></div>
      <select id="rfsel" class="font-mono text-xs bg-surface border border-border rounded px-2 py-1.5 text-muted focus:outline-none cursor-pointer">
        <option value="5000">5s</option>
        <option value="10000">10s</option>
        <option value="15000" selected>15s</option>
        <option value="30000">30s</option>
      </select>
      <button id="refreshBtn" onclick="manualRefresh()" class="font-mono text-xs px-3 py-1.5 border border-border rounded text-muted hover:text-primary hover:border-border-2 transition-colors">
        ↺ 刷新
      </button>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="h-0.5 bg-border">
    <div id="progressBar" class="progress-bar h-full bg-premium" style="width:0%"></div>
  </div>

  <!-- Status bar -->
  <div id="statusBar" class="px-4 md:px-6 py-1.5 font-mono text-[10px] text-green-400/70 border-t border-border flex items-center gap-2" style="background:#0a120a">
    <span id="statusDot" class="inline-block w-1.5 h-1.5 rounded-full bg-muted flex-shrink-0"></span>
    <span id="statusText">就绪 — 点击刷新或等待自动刷新</span>
  </div>
</header>

<!-- ══════════════════════════════════════════════════
     MOBILE TICKERS (below header on small screens)
══════════════════════════════════════════════════ -->
<div id="mobileTickers" class="md:hidden flex items-center gap-4 px-4 py-2 overflow-x-auto border-b border-border" style="background:#0d0d0d">
  <!-- injected by JS -->
</div>

<!-- ══════════════════════════════════════════════════
     MAIN
══════════════════════════════════════════════════ -->
<main class="max-w-screen-2xl mx-auto px-3 md:px-6 py-4">

  <!-- Stats bar -->
  <div class="grid grid-cols-4 gap-2 mb-4">
    <div class="bg-surface border border-border rounded p-3">
      <div class="font-mono text-[9px] text-muted tracking-widest mb-1">基金总数</div>
      <div id="s0" class="font-mono text-2xl font-semibold text-primary">47</div>
    </div>
    <div class="bg-surface border border-border rounded p-3">
      <div class="font-mono text-[9px] text-muted tracking-widest mb-1">预警数</div>
      <div id="s1" class="font-mono text-2xl font-semibold text-alert">—</div>
    </div>
    <div class="bg-surface border border-border rounded p-3">
      <div class="font-mono text-[9px] text-muted tracking-widest mb-1">最大溢价</div>
      <div id="s2" class="font-mono text-2xl font-semibold text-premium">—</div>
    </div>
    <div class="bg-surface border border-border rounded p-3">
      <div class="font-mono text-[9px] text-muted tracking-widest mb-1">最大折价</div>
      <div id="s3" class="font-mono text-2xl font-semibold text-discount">—</div>
    </div>
  </div>

  <!-- Controls row -->
  <div class="flex flex-wrap items-center gap-2 md:gap-4 mb-4">
    <!-- Threshold -->
    <div class="flex items-center gap-2">
      <span class="font-mono text-[10px] text-muted">预警阈值</span>
      <input id="thrInput" type="number" value="1.5" min="0.1" max="10" step="0.1"
        class="font-mono text-sm w-16 text-center bg-surface border border-border rounded px-2 py-1 text-premium focus:outline-none focus:border-premium"
        oninput="renderAll()">
      <span class="font-mono text-[10px] text-muted">%</span>
    </div>

    <!-- Tab filters -->
    <div class="flex bg-surface border border-border rounded overflow-hidden">
      <button onclick="setTab('all')" id="tab-all" class="tab-btn active font-mono text-[11px] px-3 py-1.5 text-primary border-r border-border">全部</button>
      <button onclick="setTab('al')" id="tab-al" class="tab-btn font-mono text-[11px] px-3 py-1.5 text-muted border-r border-border">套利机会</button>
      <button onclick="setTab('p')" id="tab-p" class="tab-btn font-mono text-[11px] px-3 py-1.5 text-muted border-r border-border">溢价</button>
      <button onclick="setTab('d')" id="tab-d" class="tab-btn font-mono text-[11px] px-3 py-1.5 text-muted">折价</button>
    </div>

    <!-- Category filters -->
    <div class="flex bg-surface border border-border rounded overflow-hidden">
      <button onclick="setCat('all')" id="cat-all" class="cat-btn active font-mono text-[11px] px-3 py-1.5 text-primary border-r border-border">全部</button>
      <button onclick="setCat('us')" id="cat-us" class="cat-btn font-mono text-[11px] px-3 py-1.5 text-muted border-r border-border">美股</button>
      <button onclick="setCat('hk')" id="cat-hk" class="cat-btn font-mono text-[11px] px-3 py-1.5 text-muted border-r border-border">港股</button>
      <button onclick="setCat('cm')" id="cat-cm" class="cat-btn font-mono text-[11px] px-3 py-1.5 text-muted border-r border-border">商品</button>
      <button onclick="setCat('cn')" id="cat-cn" class="cat-btn font-mono text-[11px] px-3 py-1.5 text-muted">A股</button>
    </div>
  </div>

  <!-- Desktop Table -->
  <div class="hidden md:block overflow-x-auto">
    <table class="w-full border-collapse text-sm">
      <thead>
        <tr class="border-b border-border text-left" style="background:#0d0d0d">
          <th class="font-mono text-[10px] text-muted py-2 px-3 tracking-wider cursor-pointer" onclick="setSort('name')">
            名称 <span id="sort-name" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer" onclick="setSort('code')">
            代码 <span id="sort-code" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer" onclick="setSort('cat')">
            类别 <span id="sort-cat" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('nav')">
            盘中估值 <span id="sort-nav" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('officialNav')">
            T-1净值 <span id="sort-officialNav" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('price')">
            场内价格 <span id="sort-price" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('premium')">
            溢折价率 <span id="sort-premium" class="sort-arrow sort-active">↓</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('chg')">
            今日涨跌 <span id="sort-chg" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('benchChg')">
            指数涨幅 <span id="sort-benchChg" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider">套利信号</th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider">操作方向</th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider">申购限额</th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider text-right">费率</th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider text-right" onclick="setSort('shares')">
            总份额(亿) <span id="sort-shares" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider text-center">来源</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr>
          <td colspan="15" class="py-16 text-center text-muted font-mono text-xs">
            暂无数据 — 请等待自动刷新或点击「↺ 刷新」
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Mobile Cards -->
  <div id="mobileCards" class="md:hidden space-y-2">
    <div class="py-12 text-center text-muted font-mono text-xs">暂无数据</div>
  </div>

</main>

<!-- ══════════════════════════════════════════════════

<div id="modal" class="fixed inset-0 z-50 hidden">

      <div id="modalContent" class="overflow-y-auto p-6"></div>
    </div>
  </div>
</div>

// ── 主链路：先 ping（100ms），存活再拉 snapshot（3s 超时） ──
async function fetchSnapshot() {
  // ① 轻量探针：100ms 超时，快速判断 Worker 是否可达
  const pingOk = await (async () => {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 100);
    try {
      const r = await fetch(WORKER_URL + '/api/ping', { signal: ctrl.signal });
      clearTimeout(t);
      return r.ok;
    } catch (_) { clearTimeout(t); return false; }
  })();
  if (!pingOk) throw new Error('Worker 不可达');

  // ② 确认存活后拉取完整快照（3s 超时）
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 3000);
  try {
    const r = await fetch(WORKER_URL + '/api/snapshot', { signal: ctrl.signal });
    clearTimeout(timer);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  } catch (e) { clearTimeout(timer); throw e; }
}

function calcBenchChg(code, idxChg) {
  const b = BENCH[code];
  if (!b) return null;
  if (Array.isArray(b)) {
    let chg = 0, w = 0;
    b.forEach(x => {
      const v = idxChg[x.tq];
      if (v != null) { chg += v * x.w; w += x.w; }  // 缺失分量不计入分母
    });
    return w > 0 ? chg / w : null;  // 全部缺失 → null，不是 0
  }
  return idxChg[b] ?? null;  // 未抓到 → null，与真实 0% 区分
}

// FX 修正版：对每个 bench 分量叠加汇率变化
// us* → USD/CNH；hk* → HKD/CNH；sh/sz/csi/sina* → 0（CNY计价）
function calcAdjustedBenchChg(code, idxChg, fxChgUsd, fxChgHkd) {
  function fxFor(tqCode) {
    if (tqCode.startsWith('us')) return fxChgUsd || 0;
    if (tqCode.startsWith('hk')) return fxChgHkd || 0;
    return 0;
  }
  const b = BENCH[code];
  if (!b) return null;
  if (Array.isArray(b)) {
    let ret = 0, w = 0;
    b.forEach(x => {
      const ic = idxChg[x.tq];
      if (ic == null) return;  // 缺失分量跳过，与 calcBenchChg 对齐
      ret += ((1 + ic / 100) * (1 + fxFor(x.tq) / 100) - 1) * x.w;
      w += x.w;
    });
    return w > 0 ? ret / w * 100 : null;  // 全部缺失 → null
  }
  const ic = idxChg[b];
  if (ic == null) return null;
  return ((1 + ic / 100) * (1 + fxFor(b) / 100) - 1) * 100;
}

// ── 持仓代码工具（与 Worker 同逻辑） ────────────────
function holdingToTqCode(raw) {
  if (!raw || typeof raw !== 'string') return null;
  const code = raw.trim().replace(/\.(HK|US|SH|SZ)$/i, '');
  if (!code || code.includes('.') || code.includes(' ')) return null;
  if (/^\d{5}$/.test(code)) return 'hk' + code;
  if (/^\d{6}$/.test(code)) return ('6789'.includes(code[0]) ? 'sh' : 'sz') + code;
  if (/^[A-Z]{1,5}$/.test(code)) return 'us' + code;
  return null;
}

function getHoldingTqCodes(daily) {
  if (!daily) return [];
  const set = new Set();
  for (const [code, fund] of Object.entries(daily)) {
    if (code.startsWith('_') || !fund.holdings) continue;
    for (const h of fund.holdings) {
      const tq = holdingToTqCode(h.code);
      if (tq) set.add(tq);
    }
  }
  return [...set];
}

/**
 * 动态持仓加权估值（Plan A：US 跳过，归入 bench 残差）
 */
function calcDynamicNavReturn(code, idxChg, stockChg, fxChgUsd, fxChgHkd, daily) {
  const holdings = daily && daily[code] && daily[code].holdings;
  if (!holdings || !holdings.length)
    return calcAdjustedBenchChg(code, idxChg, fxChgUsd, fxChgHkd);
  let coveredReturn = 0, coveredW = 0;
  for (const h of holdings) {
    const tq = holdingToTqCode(h.code);
    if (!tq || tq.startsWith('us')) continue;
    const chg = stockChg[tq];
    if (chg == null) continue;
    const w  = h.ratio / 100;
    const fx = tq.startsWith('hk') ? (fxChgHkd || 0) : 0;
    coveredReturn += ((1 + chg / 100) * (1 + fx / 100) - 1) * w;
    coveredW += w;
  }
  const adjBench = calcAdjustedBenchChg(code, idxChg, fxChgUsd, fxChgHkd);
  if (adjBench == null && coveredW < 1.0) return null;  // 残差无法填补 → 不计算
  const benchReturn = (adjBench ?? 0) / 100;
  return (coveredReturn + benchReturn * (1 - coveredW)) * 100;
}

/**
 * 持仓覆盖率：有实时价格的持仓权重占比（US 权重不计入分子）
 */
function calcHoldingCoverage(code, stockChg, daily) {
  const holdings = daily && daily[code] && daily[code].holdings;
  if (!holdings || !holdings.length) return 0;
  let totalW = 0, coveredW = 0;
  for (const h of holdings) {
    const w = h.ratio / 100;
    totalW += w;
    const tq = holdingToTqCode(h.code);
    if (!tq || tq.startsWith('us')) continue;
    if (stockChg[tq] != null) coveredW += w;
  }
  return totalW > 0 ? coveredW / totalW : 0;
}

      const fxChgUsd = (fxUsdCnh && t1Fx && t1Fx.usd_cnh_t1)
        ? (fxUsdCnh / t1Fx.usd_cnh_t1 - 1) * 100 : 0;
      const fxChgHkd = (fxHkdCnh && t1Fx && t1Fx.hkd_cnh_t1)
        ? (fxHkdCnh / t1Fx.hkd_cnh_t1 - 1) * 100 : 0;

      funds = FUNDS.map(f => {

        const prevClose = tq ? tq.prevClose : null;
        const benchChg       = calcBenchChg(f.code, idxChg);
        const adjBenchChg    = calcAdjustedBenchChg(f.code, idxChg, fxChgUsd, fxChgHkd);

        const driftActive  = drift5d !== 0 && driftN >= 3 && driftLagDays <= 2;
        const alpha        = driftActive ? Math.max(-0.02, Math.min(0.02, drift5d)) : 0;
        const driftStatus  = driftActive ? 'ACTIVE' : 'SUSPENDED';

        // T-2 检测与链式修正（同 Worker 逻辑）
        const todayStr = new Date().toISOString().slice(0, 10);
        const navLag   = navDate ? Math.round((new Date(todayStr) - new Date(navDate)) / 86400000) : 99;
        const estNavYesterday = fundDaily ? (fundDaily.est_nav_yesterday || null) : null;
        const navFetchTime    = fundDaily ? (fundDaily.nav_fetch_time || null) : null;
        const fetchAgeH       = navFetchTime ? (Date.now() - new Date(navFetchTime).getTime()) / 3600000 : 999;
        const useChained = estNavYesterday && navLag >= 2 && fetchAgeH <= 36;
        const base = useChained ? estNavYesterday : (officialNav || prevClose);

        let nav = null, premium = null;
        if (base > 0 && price != null && dynNavReturn != null) {  // dynNavReturn null = 指数缺失
          nav = base * (1 + dynNavReturn / 100) * (1 + alpha);
          premium = (price - nav) / nav * 100;
        }
        const holdingsDate = fundDaily ? (fundDaily.holdings_date || null) : null;
        return { code: f.code, name: f.name, cat: f.cat, price, chg, nav, officialNav, estNavYesterday: useChained ? estNavYesterday : null, navDate, navLag, useChained, premium, benchChg, benchOk, fxAdj, holdingCoverage, holdingsDate, drift5d, driftN, driftStatus, quota: f.quota, fee: f.fee, rfee: f.rfee, vol, _src: 'L' };
      });
      indices = {};
      TICKER_IDX.forEach(i => {
        const d = tqData.indices[i.tq];
        if (d) indices[i.tq] = d.chg;
      });
      lastTs = Date.now();
    }

    renderAll();
    renderTickers(indices);
    checkAlerts();
    const time = new Date(lastTs).toLocaleTimeString('zh-CN', {hour12:false});
    // 判断数据质量：本地直连时美股价格为上一收盘（A股时段美市休市）
    const hasPrice = funds.some(f => f.price != null);
    let srcLabel, qualityNote;
    if (snap) {
      srcLabel   = '☁️ Worker';
      qualityNote = '全量实时';
    } else if (hasPrice) {
      srcLabel   = '⚡ 直连';
      qualityNote = '港/A实时 · 美股T-1';
    } else {
      srcLabel   = '⚠️ 离线';
      qualityNote = '仅T-1净值';
    }
    setSt(`✓ ${time} [${srcLabel}] ${qualityNote} — ${funds.length}只基金`, false);
  } catch (e) {
    setSt(`✗ 获取失败: ${e.message}`, false);
    console.error(e);
  }
  refreshing = false;
}

// ── 统计栏 ──────────────────────────────────────────
function renderStats() {
  const thr = parseFloat(document.getElementById('thrInput').value) || 1.5;
  const ok = funds.filter(f => f.premium != null);
  const premVals = ok.filter(f => f.premium > 0).map(f => f.premium);
  const discVals = ok.filter(f => f.premium < 0).map(f => f.premium);
  const alerts = ok.filter(f => Math.abs(f.premium) >= thr);

  document.getElementById('s0').textContent = funds.length;
  document.getElementById('s1').textContent = alerts.length;
  document.getElementById('s2').textContent = premVals.length
    ? '+' + Math.max(...premVals).toFixed(2) + '%' : '—';
  document.getElementById('s3').textContent = discVals.length
    ? Math.min(...discVals).toFixed(2) + '%' : '—';
}

// ── 过滤+排序 ────────────────────────────────────────
function getFiltered() {
  const thr = parseFloat(document.getElementById('thrInput').value) || 1.5;
  let data = [...funds];
  if (curCat !== 'all') data = data.filter(f => f.cat === curCat);
  if (curTab === 'al') data = data.filter(f => f.premium != null && Math.abs(f.premium) >= thr);
  else if (curTab === 'p') data = data.filter(f => f.premium != null && f.premium > 0);
  else if (curTab === 'd') data = data.filter(f => f.premium != null && f.premium < 0);
  data.sort((a, b) => {
    let va = a[sCol], vb = b[sCol];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return sAsc ? va.localeCompare(vb, 'zh') : vb.localeCompare(va, 'zh');
    return sAsc ? va - vb : vb - va;
  });
  return data;
}

// ── 排序 ────────────────────────────────────────────
function setSort(col) {

    sCol = col;
    sAsc = col === 'name' || col === 'code'; // string cols default asc

// ── 预警检测 ────────────────────────────────────────
function checkAlerts() {
  const thr = parseFloat(document.getElementById('thrInput').value) || 1.5;
  const alerts = funds.filter(f => f.premium != null && Math.abs(f.premium) >= thr);
  alerts.forEach(f => {
    if (!prevAlerts.has(f.code)) {
      prevAlerts.add(f.code);
      // Could play a sound or show browser notification here
    }
  });
  // Remove funds no longer alerting
  prevAlerts.forEach(code => {
    if (!alerts.find(f => f.code === code)) prevAlerts.delete(code);
  });
}

    </div>

    <div class="grid grid-cols-3 gap-2 text-center mb-4">
      <div class="bg-surface border border-border rounded p-2">
        <div class="font-mono text-[9px] text-muted">申购限额</div>
        <div class="font-mono text-xs text-primary mt-0.5">${f.quota}</div>
      </div>
      <div class="bg-surface border border-border rounded p-2">
        <div class="font-mono text-[9px] text-muted">申购费率</div>
        <div class="font-mono text-xs text-primary mt-0.5">${f.fee}</div>
      </div>
      <div class="bg-surface border border-border rounded p-2">
        <div class="font-mono text-[9px] text-muted">赎回费率</div>
        <div class="font-mono text-xs text-primary mt-0.5">${f.rfee}</div>
      </div>
    </div>

    ${buildHoldingsHtml(f.code, f)}

    <div id="driftChartWrap" class="border border-border rounded overflow-hidden mb-3">
      <div class="px-2 py-1.5 border-b border-border flex items-center justify-between" style="background:#0d0d0d">
        <span class="font-mono text-[9px] text-muted tracking-wider">30日误差趋势</span>
        <span class="font-mono text-[9px] text-muted/40">日 drift = (实际净值 − 估值) / 估值</span>
      </div>
      <div class="p-2" style="height:110px;position:relative">
        <canvas id="driftChart"></canvas>
      </div>
    </div>

    <div class="mt-2 pt-2 border-t border-border/30 flex items-center justify-between gap-2">
      <span class="font-mono text-[9px] text-muted/50 leading-tight">${buildSyncTimeHtml()}</span>
      <span class="font-mono text-[9px] text-muted/50 flex-shrink-0">来源: ${f._src === 'W' ? 'Worker' : '直连'}</span>
    </div>
  `;
  document.getElementById('modal').classList.remove('hidden');

  // history 已内嵌于 _fundDaily[code].history，无需额外请求。
  // 若 _fundDaily 尚未就绪（冷启动），loadFundDaily() 会即时 fetch 并缓存。
  const _modalCode = code;
  loadFundDaily().then(daily => {
    if (!document.getElementById('driftChart')) return; // 弹窗已关闭
    if (_modalCode === code) {
      renderDriftChart(daily && daily[_modalCode] && daily[_modalCode].history);
    }
  });
}

function buildSyncTimeHtml() {
  const meta = _fundDaily && _fundDaily['_meta'];
  if (!meta || !meta.sync_time) return '';
  const t = new Date(meta.sync_time);
  const bj = t.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
  const holdStr = (meta.hold_ok != null && meta.total != null)
    ? `  持仓 ${meta.hold_ok}/${meta.total}`
    : '';
  return `上次同步: ${bj} (北京)${holdStr}`;
}

function buildBenchLabel(bench) {
  if (!bench) return '—';
  if (typeof bench === 'string') return bench.replace(/^(us|hk|sh|sz|sina|csi)/i, '');
  if (Array.isArray(bench)) {
    return bench.map(b => {
      const sym = b.tq.replace(/^(us|hk|sh|sz|sina|csi)/i, '');
      return `${sym} ${Math.round(b.w * 100)}%`;
    }).join(' + ');
  }
  return '—';
}

function buildHoldingsHtml(code, fund) {
  const daily = _fundDaily && _fundDaily[code];
  const benchLabel = daily ? buildBenchLabel(daily.bench) : '';
  const coverage = fund && fund.holdingCoverage > 0
    ? Math.round(fund.holdingCoverage * 100) + '%'
    : null;
  const holdingsDate = fund && fund.holdingsDate;
  const header = `
    <div class="border border-border rounded overflow-hidden mb-3">
      <div class="flex items-center justify-between px-2 py-1.5 border-b border-border" style="background:#0d0d0d">
        <div class="flex items-center gap-2">
          <span class="font-mono text-[9px] text-muted tracking-wider">前十大持仓</span>
          ${holdingsDate ? `<span class="font-mono text-[9px] text-muted/40">截止 ${holdingsDate}</span>` : ''}
        </div>
        <div class="flex items-center gap-2">
          ${coverage ? `<span class="font-mono text-[9px] text-blue-400/70">持仓覆盖 ${coverage}</span>` : ''}
          ${benchLabel ? `<span class="font-mono text-[9px] text-muted/60">基准: ${benchLabel}</span>` : ''}
        </div>
      </div>`;

  if (!daily || !daily.holdings || daily.holdings.length === 0) {
    // 无持仓明细时，展示对标指数作为替代
    const bench = daily && daily.bench;
    let benchRows = '';
    if (bench) {
      const items = typeof bench === 'string'
        ? [{ sym: bench.replace(/^(us|hk|sh|sz|sina|csi)/i, ''), w: 100 }]
        : bench.map(b => ({ sym: b.tq.replace(/^(us|hk|sh|sz|sina|csi)/i, ''), w: Math.round(b.w * 100) }));
      const maxW = Math.max(...items.map(x => x.w));
      benchRows = items.map(({ sym, w }) => {
        const barW = maxW > 0 ? Math.round(w / maxW * 100) : 100;
        return `<tr class="border-b border-border/30 last:border-0">
          <td class="py-1.5 px-2 w-4 font-mono text-[9px] text-blue-400/60">≈</td>
          <td class="py-1.5 px-1">
            <div class="font-mono text-[10px] text-primary/80 leading-tight">${sym}</div>
            <div class="font-mono text-[9px] text-muted/40 leading-tight">对标指数</div>
          </td>
          <td class="py-1.5 px-2 w-28">
            <div class="flex items-center gap-1.5">
              <div class="flex-1 h-1 rounded-full bg-border/40">
                <div class="h-1 rounded-full bg-blue-400/40" style="width:${barW}%"></div>
              </div>
              <span class="font-mono text-[10px] text-muted w-10 text-right flex-shrink-0">${w}%</span>
            </div>
          </td>
        </tr>`;
      }).join('');
    }
    return header + (benchRows
      ? `<table class="w-full"><tbody>${benchRows}</tbody></table></div>`
      : `<div class="px-3 py-4 text-center font-mono text-[10px] text-muted/40">暂无数据</div></div>`);
  }

  const maxRatio = Math.max(...daily.holdings.map(h => h.ratio || 0));
  const rows = daily.holdings.slice(0, 10).map((h, i) => {
    const ratio = h.ratio != null ? h.ratio : 0;
    const barW = maxRatio > 0 ? Math.round(ratio / maxRatio * 100) : 0;
    const name = h.name || h.code || '—';
    const codeStr = h.code ? `<span class="text-muted/50">${h.code}</span>` : '';
    // 持仓个股涨跌幅：HK/A = 盘中实时，US = T-1 昨收（灰色标注）
    const tq = holdingToTqCode(h.code);
    const isUs = tq && tq.startsWith('us');
    const chg = tq ? _lastStockChg[tq] : null;
    const chgHtml = chg != null
      ? isUs
        ? `<span class="font-mono text-[9px] text-muted/50 flex-shrink-0 w-16 text-right">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}% <span class="text-[8px] text-muted/30">T-1</span></span>`
        : `<span class="font-mono text-[9px] ${chg > 0 ? 'text-green-400/70' : chg < 0 ? 'text-red-400/70' : 'text-muted/50'} flex-shrink-0 w-16 text-right">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</span>`
      : '<span class="w-16"></span>';
    return `<tr class="border-b border-border/30 last:border-0">
      <td class="py-1.5 px-2 w-4 font-mono text-[9px] text-muted/40">${i + 1}</td>
      <td class="py-1.5 px-1">
        <div class="font-mono text-[10px] text-primary leading-tight">${name}</div>
        <div class="font-mono text-[9px] leading-tight mt-0.5">${codeStr}</div>
      </td>
      <td class="py-1.5 px-2">
        <div class="flex items-center gap-1.5">
          <div class="flex-1 h-1 rounded-full bg-border/40">
            <div class="h-1 rounded-full bg-blue-500/60" style="width:${barW}%"></div>
          </div>
          <span class="font-mono text-[10px] text-muted w-10 text-right flex-shrink-0">${ratio.toFixed(2)}%</span>
          ${chgHtml}
        </div>
      </td>
    </tr>`;
  }).join('');

  // 底部汇总：持仓贡献 + Bench残差 + 估值合计
  let coveredContrib = 0, coveredW = 0;
  for (const h of daily.holdings) {
    const tq = holdingToTqCode(h.code);
    if (!tq || tq.startsWith('us')) continue;
    const chg = _lastStockChg[tq];
    if (chg == null) continue;
    coveredContrib += (h.ratio / 100) * chg;
    coveredW += h.ratio / 100;
  }
  const benchResidual = (fund && fund.benchChg != null) ? fund.benchChg * (1 - coveredW) : null;
  const totalEst = (fund && fund.nav && fund.officialNav) ? (fund.nav / fund.officialNav - 1) * 100 : null;

  const sfmt = v => `${v >= 0 ? '+' : ''}${v.toFixed(2)}%`;
  const scol = v => v > 0 ? 'text-green-400/80' : v < 0 ? 'text-red-400/80' : 'text-muted/50';
  const maxAbs = Math.max(Math.abs(coveredContrib), Math.abs(benchResidual ?? 0), 0.01);
  const sbar = v => {
    const w = Math.round(Math.abs(v) / maxAbs * 100);
    const c = v >= 0 ? 'bg-green-500/40' : 'bg-red-500/40';
    return `<div class="flex-1 h-1 rounded-full bg-border/40"><div class="h-1 rounded-full ${c}" style="width:${w}%"></div></div>`;
  };

  const summaryRows = (coveredW > 0 || benchResidual != null) ? `
    <tr class="border-t border-border/50">
      <td class="pt-2 pb-1 px-2"></td>
      <td class="pt-2 pb-1 px-1 font-mono text-[9px] text-muted/50 whitespace-nowrap">持仓贡献</td>
      <td class="pt-2 pb-1 px-2"><div class="flex items-center gap-1.5">${sbar(coveredContrib)}<span class="font-mono text-[9px] ${scol(coveredContrib)} w-16 text-right flex-shrink-0">${sfmt(coveredContrib)}</span></div></td>
    </tr>
    ${benchResidual != null ? `<tr>
      <td class="py-1 px-2"></td>
      <td class="py-1 px-1 font-mono text-[9px] text-muted/50 whitespace-nowrap">Bench残差</td>
      <td class="py-1 px-2"><div class="flex items-center gap-1.5">${sbar(benchResidual)}<span class="font-mono text-[9px] ${scol(benchResidual)} w-16 text-right flex-shrink-0">${sfmt(benchResidual)}</span></div></td>
    </tr>` : ''}
    ${totalEst != null ? `<tr class="border-t border-border/30">
      <td class="pt-1.5 pb-2 px-2"></td>
      <td class="pt-1.5 pb-2 px-1 font-mono text-[9px] text-muted/60 whitespace-nowrap">估值涨跌</td>
      <td class="pt-1.5 pb-2 px-2 text-right font-mono text-[9px] ${scol(totalEst)} font-medium">${sfmt(totalEst)}</td>
    </tr>` : ''}
  ` : '';

  return header + `
    <table class="w-full"><tbody>${rows}${summaryRows}</tbody></table>
  </div>`;
}

// ── 30日误差趋势图 ───────────────────────────────────
let _driftChartInst = null;

/**
 * 渲染/更新 drift 趋势图
 * @param {object} history  fund_daily.json 内嵌的列式历史 {date,nav,est,drift}（可能为 null）
 */
function renderDriftChart(history) {
  const canvas = document.getElementById('driftChart');
  const wrap   = document.getElementById('driftChartWrap');
  if (!canvas || !wrap) return;

  // 销毁旧实例
  if (_driftChartInst) { _driftChartInst.destroy(); _driftChartInst = null; }

  // history 为列式存储 {date:[], nav:[], est:[], drift:[]}
  // 过滤出有效（非 null）drift 索引
  if (!history || !Array.isArray(history.drift)) { wrap.style.display = 'none'; return; }
  const validIdx = history.drift
    .map((d, i) => (typeof d === 'number' ? i : -1))
    .filter(i => i >= 0)
    .slice(-30);
  if (validIdx.length < 2) { wrap.style.display = 'none'; return; }

  wrap.style.display = '';
  const labels = validIdx.map(i => (history.date[i] || '').replace('-', '/'));  // MM/DD
  const values = validIdx.map(i => parseFloat((history.drift[i] * 100).toFixed(4)));

  // 5日均值参考线
  const tail5  = values.slice(-5);
  const avg5   = parseFloat((tail5.reduce((s, v) => s + v, 0) / tail5.length).toFixed(4));

  const ctx = canvas.getContext('2d');
  _driftChartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        // 正值填充（绿）
        {
          data: values.map(v => v >= 0 ? v : 0),
          fill: 'origin',
          backgroundColor: 'rgba(74,222,128,0.12)',
          borderColor: 'transparent',
          pointRadius: 0,
          tension: 0.3,
        },
        // 负值填充（红）
        {
          data: values.map(v => v < 0 ? v : 0),
          fill: 'origin',
          backgroundColor: 'rgba(248,113,113,0.12)',
          borderColor: 'transparent',
          pointRadius: 0,
          tension: 0.3,
        },
        // 主折线
        {
          label: '日误差',
          data: values,
          borderColor: 'rgba(96,165,250,0.85)',
          borderWidth: 1.5,
          fill: false,
          pointRadius: values.length > 15 ? 0 : 2,
          pointHoverRadius: 4,
          pointBackgroundColor: 'rgba(96,165,250,1)',
          tension: 0.3,
        },
        // 5日均值参考线
        {
          label: '5日均',
          data: Array(values.length).fill(avg5),
          borderColor: 'rgba(251,191,36,0.55)',
          borderWidth: 1,
          borderDash: [5, 3],
          fill: false,
          pointRadius: 0,
          pointHoverRadius: 0,
          tension: 0,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(17,17,17,0.92)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          bodyFont: { size: 9, family: 'monospace' },
          titleFont: { size: 9, family: 'monospace' },
          callbacks: {
            title: items => items[0].label,
            label: item => {
              if (item.datasetIndex === 2)
                return ` 误差: ${item.parsed.y >= 0 ? '+' : ''}${item.parsed.y.toFixed(3)}%`;
              if (item.datasetIndex === 3)
                return ` 5日均: ${item.parsed.y >= 0 ? '+' : ''}${item.parsed.y.toFixed(3)}%`;
              return null; // 隐藏填充数据集的 tooltip
            },
            filter: item => item.datasetIndex >= 2, // 只显示主线和均线
          },
        },
      },
      scales: {
        x: {
          grid:   { color: 'rgba(255,255,255,0.04)' },
          border: { color: 'rgba(255,255,255,0.08)' },
          ticks:  { color: '#505050', font: { size: 8 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 7 },
        },
        y: {
          grid: {
            color:     ctx => ctx.tick.value === 0 ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.04)',
            lineWidth: ctx => ctx.tick.value === 0 ? 1.5 : 1,
          },
          border: { color: 'rgba(255,255,255,0.08)' },
          ticks:  {
            color: '#505050',
            font: { size: 8 },
            callback: v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%',
          },
        },
      },
    },
  });
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

// Keyboard close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
