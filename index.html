<!DOCTYPE html>
<html lang="zh-CN" class="dark">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOF 套利雷达</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

  .pulse-alert { animation: pulse-alert 1.2s ease-in-out infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }
  .table-row-hover:hover { background: #1a1a1a; cursor: pointer; }
  .progress-bar { transition: width 0.25s linear; }

  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }
  .sort-arrow { opacity: 0.3; }
  .sort-active { opacity: 1; color: #f59e0b; }
  .modal-backdrop { backdrop-filter: blur(4px); }
  th { user-select: none; }
  .tag-us { background: #1a3a6b22; color: #60a5fa; border: 1px solid #1a3a6b; }
  .tag-hk { background: #6b1a1a22; color: #f87171; border: 1px solid #6b1a1a; }
  .tag-cm { background: #6b4c1a22; color: #fbbf24; border: 1px solid #6b4c1a; }

</head>
<body class="min-h-screen">

<!-- ══════════════════════════════════════════════════
     HEADER
══════════════════════════════════════════════════ -->
<header class="sticky top-0 z-50 border-b border-border" style="background:#0d0d0d">
  <div class="flex items-stretch justify-between px-4 md:px-6">
    <!-- Logo -->
    <div class="flex items-center gap-3 py-3">
      <div>
        <div class="font-mono text-xl font-semibold tracking-wider text-primary">LOF 套利雷达</div>
        <div class="font-mono text-[9px] text-muted tracking-widest mt-0.5">LIVE ARBITRAGE MONITOR</div>
      </div>
    </div>

    <!-- Tickers -->
    <div id="tickers" class="hidden md:flex items-center gap-5 px-4 overflow-hidden">
      <!-- injected by JS -->
    </div>

    <!-- Controls -->
    <div class="flex items-center gap-2 py-2 pl-3 border-l border-border flex-shrink-0">
      <div id="clock" class="font-mono text-xs text-muted hidden md:block"></div>
      <select id="rfsel" class="font-mono text-xs bg-surface border border-border rounded px-2 py-1.5 text-muted focus:outline-none cursor-pointer">
        <option value="5000">5s</option>
        <option value="10000">10s</option>
        <option value="15000" selected>15s</option>
        <option value="30000">30s</option>
      </select>
      <button id="refreshBtn" onclick="manualRefresh()" class="font-mono text-xs px-3 py-1.5 border border-border rounded text-muted hover:text-primary hover:border-border-2 transition-colors">
        ↺ 刷新
      </button>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="h-0.5 bg-border">
    <div id="progressBar" class="progress-bar h-full bg-premium" style="width:0%"></div>
  </div>

  <!-- Status bar -->
  <div id="statusBar" class="px-4 md:px-6 py-1.5 font-mono text-[10px] text-green-400/70 border-t border-border flex items-center gap-2" style="background:#0a120a">
    <span id="statusDot" class="inline-block w-1.5 h-1.5 rounded-full bg-muted flex-shrink-0"></span>
    <span id="statusText">就绪 — 点击刷新或等待自动刷新</span>
  </div>
</header>

<!-- ══════════════════════════════════════════════════
     MOBILE TICKERS (below header on small screens)
══════════════════════════════════════════════════ -->
<div id="mobileTickers" class="md:hidden flex items-center gap-4 px-4 py-2 overflow-x-auto border-b border-border" style="background:#0d0d0d">
  <!-- injected by JS -->
</div>

<!-- ══════════════════════════════════════════════════
     MAIN
══════════════════════════════════════════════════ -->
<main class="max-w-screen-2xl mx-auto px-3 md:px-6 py-4">

  <!-- Stats bar -->
  <div class="grid grid-cols-4 gap-2 mb-4">
    <div class="bg-surface border border-border rounded p-3">
      <div class="font-mono text-[9px] text-muted tracking-widest mb-1">基金总数</div>
      <div id="s0" class="font-mono text-2xl font-semibold text-primary">47</div>
    </div>
    <div class="bg-surface border border-border rounded p-3">
      <div class="font-mono text-[9px] text-muted tracking-widest mb-1">预警数</div>
      <div id="s1" class="font-mono text-2xl font-semibold text-alert">—</div>
    </div>
    <div class="bg-surface border border-border rounded p-3">
      <div class="font-mono text-[9px] text-muted tracking-widest mb-1">最大溢价</div>
      <div id="s2" class="font-mono text-2xl font-semibold text-premium">—</div>
    </div>
    <div class="bg-surface border border-border rounded p-3">
      <div class="font-mono text-[9px] text-muted tracking-widest mb-1">最大折价</div>
      <div id="s3" class="font-mono text-2xl font-semibold text-discount">—</div>
    </div>
  </div>

  <!-- Controls row -->
  <div class="flex flex-wrap items-center gap-2 md:gap-4 mb-4">
    <!-- Threshold -->
    <div class="flex items-center gap-2">
      <span class="font-mono text-[10px] text-muted">预警阈值</span>
      <input id="thrInput" type="number" value="1.5" min="0.1" max="10" step="0.1"
        class="font-mono text-sm w-16 text-center bg-surface border border-border rounded px-2 py-1 text-premium focus:outline-none focus:border-premium"
        oninput="renderAll()">
      <span class="font-mono text-[10px] text-muted">%</span>
    </div>

    <!-- Tab filters -->
    <div class="flex bg-surface border border-border rounded overflow-hidden">
      <button onclick="setTab('all')" id="tab-all" class="tab-btn active font-mono text-[11px] px-3 py-1.5 text-primary border-r border-border">全部</button>
      <button onclick="setTab('al')" id="tab-al" class="tab-btn font-mono text-[11px] px-3 py-1.5 text-muted border-r border-border">套利机会</button>
      <button onclick="setTab('p')" id="tab-p" class="tab-btn font-mono text-[11px] px-3 py-1.5 text-muted border-r border-border">溢价</button>
      <button onclick="setTab('d')" id="tab-d" class="tab-btn font-mono text-[11px] px-3 py-1.5 text-muted">折价</button>
    </div>

    <!-- Category filters -->
    <div class="flex bg-surface border border-border rounded overflow-hidden">
      <button onclick="setCat('all')" id="cat-all" class="cat-btn active font-mono text-[11px] px-3 py-1.5 text-primary border-r border-border">全部</button>
      <button onclick="setCat('us')" id="cat-us" class="cat-btn font-mono text-[11px] px-3 py-1.5 text-muted border-r border-border">美股</button>
      <button onclick="setCat('hk')" id="cat-hk" class="cat-btn font-mono text-[11px] px-3 py-1.5 text-muted border-r border-border">港股</button>
      <button onclick="setCat('cm')" id="cat-cm" class="cat-btn font-mono text-[11px] px-3 py-1.5 text-muted border-r border-border">商品</button>
      <button onclick="setCat('cn')" id="cat-cn" class="cat-btn font-mono text-[11px] px-3 py-1.5 text-muted">A股</button>
    </div>
  </div>

  <!-- Desktop Table -->
  <div class="hidden md:block overflow-x-auto">
    <table class="w-full border-collapse text-sm">
      <thead>
        <tr class="border-b border-border text-left" style="background:#0d0d0d">
          <th class="font-mono text-[10px] text-muted py-2 px-3 tracking-wider cursor-pointer" onclick="setSort('name')">
            名称 <span id="sort-name" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer" onclick="setSort('code')">
            代码 <span id="sort-code" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer" onclick="setSort('cat')">
            类别 <span id="sort-cat" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('nav')">
            盘中估值 <span id="sort-nav" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('officialNav')">
            T-1净值 <span id="sort-officialNav" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('price')">
            场内价格 <span id="sort-price" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('premium')">
            溢折价率 <span id="sort-premium" class="sort-arrow sort-active">↓</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('chg')">
            今日涨跌 <span id="sort-chg" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider cursor-pointer text-right" onclick="setSort('benchChg')">
            指数涨幅 <span id="sort-benchChg" class="sort-arrow">↕</span>
          </th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider">套利信号</th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider">操作方向</th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider">申购限额</th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider text-right">费率</th>
          <th class="font-mono text-[10px] text-muted py-2 px-2 tracking-wider text-right" onclick="setSort('vol')">
            成交额(万) <span id="sort-vol" class="sort-arrow">↕</span>
          </th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr>
          <td colspan="14" class="py-16 text-center text-muted font-mono text-xs">
            暂无数据 — 请等待自动刷新或点击「↺ 刷新」
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Mobile Cards -->
  <div id="mobileCards" class="md:hidden space-y-2">
    <div class="py-12 text-center text-muted font-mono text-xs">暂无数据</div>
  </div>

</main>

<!-- ══════════════════════════════════════════════════

══════════════════════════════════════════════════ -->
<div id="modal" class="fixed inset-0 z-50 hidden">
  <div class="modal-backdrop absolute inset-0 bg-black/70" onclick="closeModal()"></div>
  <div class="absolute inset-0 flex items-center justify-center p-4">

      <div id="modalContent"></div>
    </div>
  </div>
</div>

function getAllTqCodes() {
  const set = new Set();
  FUNDS.forEach(f => set.add(f.tq));
  Object.values(BENCH).forEach(b => {
    if (Array.isArray(b)) b.forEach(x => set.add(x.tq));
    else set.add(b);
  });
  TICKER_IDX.forEach(i => set.add(i.tq));
  // 东方财富专属，不走腾讯
  ['sinaAG0','csi930917','csi930914','csi930792','sh000985','hkHSSI','hkHSMI','hkHSCI'].forEach(c => set.delete(c));
  // sz399961等A股指数腾讯可访问，保留
  return [...set];
}

function fetchTencent() {
  return new Promise(resolve => {
    const codes = getAllTqCodes().join(',');
    const s = document.createElement('script');
    let done = false;
    const t = setTimeout(() => {
      if (!done) { done = true; s.remove(); resolve({ funds: {}, indices: {} }); }
    }, 10000);
    s.onload = () => {
      if (done) return; done = true; clearTimeout(t);
      const r = { funds: {}, indices: {} };
      // 解析基金行情
      FUNDS.forEach(f => {
        const v = window['v_' + f.tq];
        if (!v || v.length < 10) return;
        const p = v.split('~');
        const price = parseFloat(p[3]), prev = parseFloat(p[4]);
        const vol = parseFloat(p[37]) || 0;
        if (price > 0) r.funds[f.code] = { price, prevClose: prev, chg: prev > 0 ? (price - prev) / prev * 100 : 0, vol };
      });
      // 解析指数行情
      const idxSet = new Set();
      Object.values(BENCH).forEach(b => {
        if (Array.isArray(b)) b.forEach(x => idxSet.add(x.tq));
        else idxSet.add(b);
      });
      TICKER_IDX.forEach(i => idxSet.add(i.tq));
      ['sinaAG0','csi930917','csi930914','csi930792','sh000985','hkHSSI','hkHSMI','hkHSCI'].forEach(c => idxSet.delete(c));
      idxSet.forEach(tq => {
        const v = window['v_' + tq];
        if (!v || v.length < 5) return;
        const p = v.split('~');
        const price = parseFloat(p[3]), prev = parseFloat(p[4]);
        if (price > 0) r.indices[tq] = { chg: prev > 0 ? (price - prev) / prev * 100 : 0 };
      });
      s.remove(); resolve(r);
    };
    s.onerror = () => { if (!done) { done = true; clearTimeout(t); s.remove(); resolve({ funds: {}, indices: {} }); } };
    s.src = `https://qt.gtimg.cn/q=${codes}&_=${Date.now()}`;
    document.head.appendChild(s);
  });
}

function fetchNavFromFundgz(code) {
  return new Promise(resolve => {
    const handler = d => {
      clearTimeout(timer);
      const v = parseFloat(d?.dwjz);
      const g = parseFloat(d?.gsz);
      if (v > 0 && v <= 50) resolve({ nav: v, date: d?.jzrq || '' });
      else if (g > 0)       resolve({ nav: g, date: (d?.gztime || '').slice(0, 10) });
      else                  resolve(null);
    };
    const timer = setTimeout(() => {
      const i = _fgzQ.indexOf(handler); if (i > -1) _fgzQ.splice(i, 1);
      resolve(null);
    }, 6000);
    _fgzQ.push(handler);
    const s = document.createElement('script');
    s.onerror = () => {
      clearTimeout(timer);
      const i = _fgzQ.indexOf(handler); if (i > -1) _fgzQ.splice(i, 1);
      resolve(null);
    };
    s.src = `https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;
    document.head.appendChild(s);
    s.onload = () => s.remove();
  });
}

// NAV 日级缓存：每天只抓一次，不阻塞15s价格刷新
let _navCache = null;
let _navCacheDate = '';

async function loadNavsBackground() {
  const today = new Date().toLocaleDateString('zh-CN');
  if (_navCache && _navCacheDate === today) return;

  const map = {};

  // Step 1: Worker /api/nav — 服务端 fetch 可加 Referer，lsjz/fundgz 均可访问
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 10000);
    const resp = await fetch(WORKER_URL + '/api/nav', { signal: ctrl.signal });
    clearTimeout(t);
    if (resp.ok) Object.assign(map, await resp.json());
    console.log(`[NAV] Worker 返回 ${Object.keys(map).length} 只`);
  } catch (e) {
    console.warn('[NAV] Worker /api/nav 失败:', e.message);
  }

  // Step 2: 缺口用浏览器 fundgz JSONP 补（串行，保证队列有序）
  const missing = FUNDS.filter(f => !map[f.code]);
  if (missing.length > 0) {
    console.log(`[NAV] fundgz 补充 ${missing.length} 只...`);
    for (const f of missing) {
      const r = await fetchNavFromFundgz(f.code);
      if (r) map[f.code] = r;
    }
  }

  _navCache = map;
  _navCacheDate = today;
  renderAll();
  console.log(`[NAV] 载入完成，${Object.keys(map).length}/${FUNDS.length} 只`);
}

function calcBenchChg(code, idxChg) {
  const b = BENCH[code];
  if (!b) return 0;
  if (Array.isArray(b)) {
    let chg = 0, w = 0;
    b.forEach(x => {
      const v = idxChg[x.tq];
      if (v != null) { chg += v * x.w; w += x.w; }  // 缺失分量不计入分母
    });
    return w > 0 ? chg / w : 0;
  }
  return idxChg[b] ?? 0;
}

// ── 核心刷新（Hybrid：Worker 主链路 → 本地直连备用） ──
async function doRefresh() {
  if (refreshing) return;
  refreshing = true;
  setSt('获取行情中...', true);
  try {
    // NAV 用日级缓存（由 loadNavsBackground 后台填充，不阻塞价格刷新）
    const navMap = _navCache || {};

    // 🥇 主链路：Worker /api/snapshot（3s 超时）
    let snap = null;
    try {
      snap = await fetchSnapshot();
      if (!snap || !Array.isArray(snap.funds) || snap.funds.length === 0) snap = null;
    } catch (e) {
      console.warn('☁️ Worker snapshot 不可用，切换本地直连:', e.message);
    }

    if (snap) {
      // 🥇 Worker 数据 + 缓存 NAV 合并
      funds = snap.funds.map(f => {
        const navInfo = navMap[f.code];
        if (!navInfo) return f;
        const officialNav = navInfo.nav;
        const navDate = navInfo.date;
        const base = officialNav || f.prevClose;
        let nav = f.nav, premium = f.premium;
        if (base > 0 && f.price != null) {
          nav = base * (1 + (f.benchChg || 0) / 100);
          premium = (f.price - nav) / nav * 100;
        }
        return { ...f, officialNav, navDate, nav, premium };
      });
      indices = snap.indices || {};
      lastTs = snap.ts || Date.now();
    } else {
      // 🥈 备用链路：本地多源直连（navMap 已并行就绪）
      const [tqData, emIdx, sinaIdx] = await Promise.all([
        fetchTencent(), fetchEastmoney(), fetchSina(),
      ]);
      const idxChg = {};
      Object.entries(tqData.indices).forEach(([c, d]) => { idxChg[c] = d.chg; });
      Object.entries(emIdx).forEach(([c, v]) => { idxChg[c] = v; });
      Object.entries(sinaIdx).forEach(([c, v]) => { idxChg[c] = v; });
      if (!idxChg['hkHSMI']) idxChg['hkHSMI'] = idxChg['hkHSSI'] ?? idxChg['hkHSI'] ?? null;
      if (!idxChg['hkHSSI']) idxChg['hkHSSI'] = idxChg['hkHSI'] ?? null;
      if (!idxChg['hkHSCI']) idxChg['hkHSCI'] = idxChg['hkHSI'] ?? null;
      funds = FUNDS.map(f => {
        const tq = tqData.funds[f.code];
        const navInfo = navMap[f.code];
        const officialNav = navInfo ? navInfo.nav : null;
        const navDate = navInfo ? navInfo.date : '';
        const price = tq ? tq.price : null;
        const chg = tq ? tq.chg : null;
        const vol = tq ? tq.vol : 0;
        const prevClose = tq ? tq.prevClose : null;
        const benchChg = calcBenchChg(f.code, idxChg);
        const base = officialNav || prevClose;
        let nav = null, premium = null;
        if (base > 0 && price != null) {
          nav = base * (1 + benchChg / 100);
          premium = (price - nav) / nav * 100;
        }
        return { code: f.code, name: f.name, cat: f.cat, price, chg, nav, officialNav, navDate, premium, benchChg, quota: f.quota, fee: f.fee, rfee: f.rfee, vol };
      });
      indices = {};
      TICKER_IDX.forEach(i => {
        const d = tqData.indices[i.tq];
        if (d) indices[i.tq] = d.chg;
      });
      lastTs = Date.now();
    }

    renderAll();
    renderTickers(indices);
    checkAlerts();
    const time = new Date(lastTs).toLocaleTimeString('zh-CN', {hour12:false});
    const src = snap ? '☁️ Worker' : '⚡ 直连';
    setSt(`✓ ${time} [${src}] — ${funds.length}只基金已更新`, false);
  } catch (e) {
    setSt(`✗ 获取失败: ${e.message}`, false);
    console.error(e);
  }
  refreshing = false;
}

function renderStats() {

// ── 过滤+排序 ────────────────────────────────────────
function getFiltered() {
  const thr = parseFloat(document.getElementById('thrInput').value) || 1.5;
  let data = [...funds];
  if (curCat !== 'all') data = data.filter(f => f.cat === curCat);
  if (curTab === 'al') data = data.filter(f => f.premium != null && Math.abs(f.premium) >= thr);
  else if (curTab === 'p') data = data.filter(f => f.premium != null && f.premium > 0);
  else if (curTab === 'd') data = data.filter(f => f.premium != null && f.premium < 0);
  data.sort((a, b) => {
    let va = a[sCol], vb = b[sCol];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return sAsc ? va.localeCompare(vb, 'zh') : vb.localeCompare(va, 'zh');
    return sAsc ? va - vb : vb - va;
  });
  return data;
}

    const premStr = p != null ? (p >= 0 ? '+' : '') + p.toFixed(2) + '%' : '—';
    const premBg = p == null ? 'bg-surface border-border'
      : isAlert ? (isPrem ? 'bg-premium/10 border-premium/40' : 'bg-discount/10 border-discount/40')
      : isPrem ? 'bg-surface border-border' : 'bg-surface border-border';
    const premCls = p == null ? 'text-muted'
      : isAlert ? (isPrem ? 'text-premium pulse-alert' : 'text-discount pulse-alert')
      : isPrem ? 'text-premium' : 'text-discount';
    const catLabel = {us:'美股',hk:'港股',cm:'商品',cn:'A股'}[f.cat] || f.cat;
    const catTag = {us:'tag-us',hk:'tag-hk',cm:'tag-cm',cn:'tag-cn'}[f.cat] || '';
    const navStr = f.nav != null ? f.nav.toFixed(4) : '—';
    const priceStr = f.price != null ? f.price.toFixed(4) : '—';
    const benchStr = f.benchChg != null ? (f.benchChg >= 0 ? '+' : '') + f.benchChg.toFixed(2) + '%' : '—';
    const benchCls = f.benchChg > 0 ? 'text-green-400' : f.benchChg < 0 ? 'text-red-400' : 'text-muted';
    let signalHtml = '';
    if (isAlert) {
      signalHtml = isPrem
        ? '<span class="text-premium text-xs font-mono">▼ 卖出套利</span>'
        : '<span class="text-discount text-xs font-mono">▲ 买入套利</span>';
    }
    return `
      <div class="border rounded-lg p-3 cursor-pointer ${premBg} active:opacity-80"
           onclick="openModal('${f.code}')">
        <div class="flex items-start justify-between mb-2">
          <div class="flex-1 min-w-0">
            <div class="font-mono text-sm text-primary truncate">${f.name}</div>
            <div class="flex items-center gap-2 mt-0.5">
              <span class="font-mono text-[10px] text-muted">${f.code}</span>
              <span class="font-mono text-[9px] px-1.5 py-0.5 rounded ${catTag}">${catLabel}</span>
            </div>
          </div>
          <div class="text-right flex-shrink-0 ml-3">
            <div class="font-mono text-xl font-semibold ${premCls}">${premStr}</div>
            <div class="font-mono text-[9px] text-muted mt-0.5">溢折价率</div>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center border-t border-border/40 pt-2">
          <div>
            <div class="font-mono text-xs text-primary">${priceStr}</div>
            <div class="font-mono text-[9px] text-muted">场内价格</div>
          </div>
          <div>
            <div class="font-mono text-xs text-primary">${navStr}</div>
            <div class="font-mono text-[9px] text-muted">盘中估值</div>
          </div>
          <div>
            <div class="font-mono text-xs ${benchCls}">${benchStr}</div>
            <div class="font-mono text-[9px] text-muted">指数涨幅</div>
          </div>
        </div>
        ${(signalHtml || f.quota !== '开放') ? `
        <div class="flex items-center justify-between mt-2 pt-2 border-t border-border/40">
          <div>${signalHtml}</div>
          <div class="font-mono text-[10px] ${f.quota === '暂停' ? 'text-red-400' : f.quota === '开放' ? 'text-green-400' : 'text-yellow-400'}">${f.quota}</div>
        </div>` : ''}
      </div>`;
  }).join('');
}

// ── 排序 ────────────────────────────────────────────
function setSort(col) {
  if (sCol === col) {
    sAsc = !sAsc;
  } else {
    sCol = col;
    sAsc = col === 'name' || col === 'code'; // string cols default asc
  }
  // Update sort arrows
  document.querySelectorAll('[id^="sort-"]').forEach(el => {
    el.className = 'sort-arrow';
    el.textContent = '↕';
  });
  const el = document.getElementById('sort-' + col);
  if (el) {
    el.className = 'sort-active';
    el.textContent = sAsc ? '↑' : '↓';
  }
  renderAll();
}

// ── 标签/类别切换 ────────────────────────────────────
function setTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.className = b.className.replace('text-primary', 'text-muted');
  });
  const btn = document.getElementById('tab-' + tab);
  if (btn) btn.className = btn.className.replace('text-muted', 'text-primary');
  renderAll();
}

function setCat(cat) {
  curCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.className = b.className.replace('text-primary', 'text-muted');
  });
  const btn = document.getElementById('cat-' + cat);
  if (btn) btn.className = btn.className.replace('text-muted', 'text-primary');
  renderAll();
}

// ── 预警检测 ────────────────────────────────────────
function checkAlerts() {
  const thr = parseFloat(document.getElementById('thrInput').value) || 1.5;
  const alerts = funds.filter(f => f.premium != null && Math.abs(f.premium) >= thr);
  alerts.forEach(f => {
    if (!prevAlerts.has(f.code)) {
      prevAlerts.add(f.code);
      // Could play a sound or show browser notification here
    }
  });
  // Remove funds no longer alerting
  prevAlerts.forEach(code => {
    if (!alerts.find(f => f.code === code)) prevAlerts.delete(code);
  });
}

// ── 详情弹窗 ────────────────────────────────────────
function openModal(code) {
  const f = funds.find(f => f.code === code);
  if (!f) return;
  const thr = parseFloat(document.getElementById('thrInput').value) || 1.5;
  const p = f.premium;
  const isAlert = p != null && Math.abs(p) >= thr;
  const isPrem = p != null && p > 0;
  const premStr = p != null ? (p >= 0 ? '+' : '') + p.toFixed(2) + '%' : '—';
  const premCls = p == null ? 'text-muted' : isPrem ? 'text-premium' : 'text-discount';
  const catLabel = {us:'美股',hk:'港股',cm:'商品',cn:'A股'}[f.cat] || f.cat;
  const catTag = {us:'tag-us',hk:'tag-hk',cm:'tag-cm',cn:'tag-cn'}[f.cat] || '';
  let signalHtml = '<span class="text-muted">无明显套利机会</span>';
  if (isAlert && isPrem) {
    signalHtml = '<span class="text-premium font-semibold">▼ 卖出套利 — 场内溢价，建议卖出场内份额并在场外申购</span>';
  } else if (isAlert && !isPrem) {
    signalHtml = '<span class="text-discount font-semibold">▲ 买入套利 — 场内折价，建议买入场内份额并在场外赎回</span>';
  } else if (p != null && Math.abs(p) >= thr * 0.65) {
    signalHtml = '<span class="text-muted">⊙ 观察 — 接近阈值，持续关注</span>';
  }

  document.getElementById('modalContent').innerHTML = `
    <div class="mb-4">
      <div class="flex items-start gap-2 mb-1">
        <span class="font-mono text-[9px] px-1.5 py-0.5 rounded ${catTag} flex-shrink-0 mt-0.5">${catLabel}</span>
        <div>
          <div class="font-mono text-base font-semibold text-primary">${f.name}</div>
          <div class="font-mono text-xs text-muted">${f.code}</div>
        </div>
      </div>
    </div>

    <div class="text-center py-4 border border-border rounded-lg mb-4" style="background:#0d0d0d">
      <div class="font-mono text-4xl font-semibold ${premCls} ${isAlert ? 'pulse-alert' : ''}">${premStr}</div>
      <div class="font-mono text-[10px] text-muted mt-1">溢折价率</div>
    </div>

    <div class="grid grid-cols-2 gap-2 mb-4">
      ${[
        ['场内价格', f.price != null ? f.price.toFixed(4) : '—', 'text-primary'],
        ['盘中估值', f.nav != null ? f.nav.toFixed(4) : '—', 'text-primary'],
        ['T-1净值', f.officialNav != null ? f.officialNav.toFixed(4) : '—', 'text-muted'],
        ['净值日期', f.navDate || '—', 'text-muted'],
        ['今日涨跌', f.chg != null ? (f.chg >= 0 ? '+' : '') + f.chg.toFixed(2) + '%' : '—', f.chg > 0 ? 'text-green-400' : f.chg < 0 ? 'text-red-400' : 'text-muted'],
        ['指数涨幅', f.benchChg != null ? (f.benchChg >= 0 ? '+' : '') + f.benchChg.toFixed(2) + '%' : '—', f.benchChg > 0 ? 'text-green-400' : f.benchChg < 0 ? 'text-red-400' : 'text-muted'],
      ].map(([label, val, cls]) => `
        <div class="bg-surface border border-border rounded p-2">
          <div class="font-mono text-[9px] text-muted tracking-wider">${label}</div>
          <div class="font-mono text-sm ${cls} mt-0.5">${val}</div>
        </div>`).join('')}
    </div>

    <div class="border border-border rounded p-3 mb-4" style="background:#0d0d0d">
      <div class="font-mono text-[10px] text-muted tracking-wider mb-1">套利信号</div>
      <div class="font-mono text-xs">${signalHtml}</div>
    </div>

    <div class="grid grid-cols-3 gap-2 text-center">
      <div class="bg-surface border border-border rounded p-2">
        <div class="font-mono text-[9px] text-muted">申购限额</div>
        <div class="font-mono text-xs text-primary mt-0.5">${f.quota}</div>
      </div>
      <div class="bg-surface border border-border rounded p-2">
        <div class="font-mono text-[9px] text-muted">申购费率</div>
        <div class="font-mono text-xs text-primary mt-0.5">${f.fee}</div>
      </div>
      <div class="bg-surface border border-border rounded p-2">
        <div class="font-mono text-[9px] text-muted">赎回费率</div>
        <div class="font-mono text-xs text-primary mt-0.5">${f.rfee}</div>
      </div>
    </div>
  `;
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

// Keyboard close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
