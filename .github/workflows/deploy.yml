name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-pages:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@3.101.0

      - name: Deploy to Cloudflare Pages
        run: |
          MSG=$(git log -1 --format="%h %s" | LC_ALL=C tr -cd '[:print:]' | cut -c1-72)
          wrangler pages deploy . --project-name=my-arbitrage --commit-dirty --commit-message="${MSG:-deploy}" 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@3.101.0

      - name: Deploy worker-full.js
        run: wrangler deploy 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Sync WX_KEY secret to Worker
        run: |
          if [ -n "$WX_KEY" ]; then
            echo "$WX_KEY" | wrangler secret put WX_KEY
          fi
        env:
          WX_KEY: ${{ secrets.WX_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
