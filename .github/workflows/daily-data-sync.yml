name: Daily Fund Data Sync

on:
  schedule:
    # 16:05 UTC = 00:05 北京时间（次日凌晨），每天运行
    - cron: '5 16 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  sync:
    name: Sync NAV + Holdings + Drift Audit
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 写入 fund_daily.json 并 push
      issues:   write   # 创建 Holdings Drift Issue

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run sync + audit script
        env:
          # GITHUB_TOKEN 和 GITHUB_REPOSITORY 由 Actions 自动注入，显式传入更清晰
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # WX_KEY：在仓库 Settings → Secrets → Actions 中配置
          WX_KEY:            ${{ secrets.WX_KEY }}
        run: python .github/scripts/sync_fund_data.py

      - name: Commit updated fund data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fund_daily.json data/drift_history.json
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || (git commit -m "chore: daily sync $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
