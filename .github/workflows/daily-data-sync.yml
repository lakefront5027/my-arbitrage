name: Daily Fund Data Sync

on:
  schedule:
    # 22:30 UTC = 06:30 北京时间，每天运行
    # 此时美股已收盘 2.5h+（EDT）/ 1.5h+（EST），确保 USO/BNO/QQQ 等收盘涨跌幅稳定
    # 商品期货（COMEX 金 13:30 / 油 14:30 ET）更早结算，同样安全覆盖
    # 较原 23:00 提早 30 分钟，缓解 Actions 队列延迟，保持 07:00 前完成同步
    - cron: '30 22 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  sync:
    name: Sync NAV + Holdings + Drift Audit
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 写入 fund_daily.json 并 push
      issues:   write   # 创建 Holdings Drift Issue

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install chinesecalendar pdfplumber google-generativeai

      - name: Run sync + audit script
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WX_KEY:            ${{ secrets.WX_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/sync_fund_data.py

      - name: Commit updated fund data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fund_daily.json
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || (git commit -m "chore: daily sync $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
