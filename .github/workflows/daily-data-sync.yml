name: Daily Fund Data Sync

on:
  schedule:
    # 16:05 UTC = 00:05 北京时间（次日凌晨），每天运行
    - cron: '5 16 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  sync:
    name: Sync NAV + Holdings from Eastmoney
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许 Action 推送对 fund_daily.json 的修改

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run sync script (NAV + Holdings)
        run: python .github/scripts/sync_fund_data.py

      - name: Commit updated fund data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fund_daily.json
          # 只有文件有变化时才 commit（无新数据时安静退出）
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || (git commit -m "chore: daily sync $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
