name: Test PDF Data Sources

on:
  workflow_dispatch:
    inputs:
      fund_codes:
        description: '基金代码（空格分隔，默认 161129 501018）'
        required: false
        default: '161129 501018'

jobs:
  test:
    name: Test all PDF sources from Actions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pdfplumber

      - name: Multi-source test (cninfo / eastmoney / szse / sse / sina)
        run: python .github/scripts/test_pdf_sources.py ${{ github.event.inputs.fund_codes }}

      - name: cninfo original test (single fund, reference)
        run: python .github/scripts/test_pdf_holdings.py 161129 || true
