name: Test PDF Data Sources

on:
  workflow_dispatch:
    inputs:
      fund_codes:
        description: '基金代码（空格分隔，默认全部16只QDII）'
        required: false
        default: '161129 501018 160723 501312 160216 161116 160719 161815 501300 164906 163208 164824 162411 161226 501021 159980'

jobs:
  test:
    name: Test all PDF sources from Actions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pdfplumber

      - name: Multi-source test (JJGG API + PDF download for all QDII funds)
        run: python .github/scripts/test_pdf_sources.py ${{ github.event.inputs.fund_codes }}

      - name: cninfo original test (reference, expected to fail from Actions)
        run: python .github/scripts/test_pdf_holdings.py 161129 || true
